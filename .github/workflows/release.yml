name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # changelog wants full history
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: "Install quill (ADR 16 decision 12: darwin ad-hoc signing)"
        run: |
          mkdir -p "${RUNNER_TEMP}/quill-bin"
          curl -sSfL https://get.anchore.io/quill | sh -s -- -b "${RUNNER_TEMP}/quill-bin" v0.7.1
          echo "${RUNNER_TEMP}/quill-bin" >> "$GITHUB_PATH"
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # fine-grained PAT, contents:write, scoped to Sawmonabo/homebrew-tap only —
          # GITHUB_TOKEN cannot push cross-repo (ADR 16 decision 13; Step 4 runbook).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
