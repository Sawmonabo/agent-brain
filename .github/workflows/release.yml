name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # changelog wants full history
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: "Install quill (ADR 16 decision 12: darwin ad-hoc signing; digest-pinned)"
        env:
          QUILL_VERSION: "0.7.1"
          QUILL_SHA256: "e58c6f86378a22507c1123e24412afd4ee2d3bb32ebd94d6059827dc0c1b3fbf" # quill_0.7.1_linux_amd64.tar.gz, from the release's own checksums.txt (tarball byte-verified 2026-07-10)
        run: |
          cd "$RUNNER_TEMP"
          curl -sSfLO "https://github.com/anchore/quill/releases/download/v${QUILL_VERSION}/quill_${QUILL_VERSION}_linux_amd64.tar.gz"
          echo "${QUILL_SHA256}  quill_${QUILL_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          mkdir -p quill-bin
          tar -xz -C quill-bin -f "quill_${QUILL_VERSION}_linux_amd64.tar.gz" quill
          echo "${RUNNER_TEMP}/quill-bin" >> "$GITHUB_PATH"
      - name: "Mint tap-push token (ADR 16 decision 6: GitHub App, per-run, homebrew-tap only)"
        id: tap_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.TAP_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.TAP_PUBLISHER_APP_PRIVATE_KEY }}
          owner: Sawmonabo
          repositories: homebrew-tap
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # per-run GitHub App installation token (~1 h expiry) minted above; the App
          # is installed on Sawmonabo/homebrew-tap only, so no long-lived personal
          # credential exists in CI (ADR 16 decision 6). GITHUB_TOKEN still cannot
          # push cross-repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap_token.outputs.token }}
