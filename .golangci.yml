version: "2"
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec
    - errorlint
    - misspell
    - unconvert
    - unparam
    - nolintlint
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - gosec # test fixtures use 0o644 files and variable paths by design
formatters:
  enable:
    - gofmt
    - gofumpt
