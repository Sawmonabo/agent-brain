version: "2"
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec
    - errorlint
    - misspell
    - unconvert
    - unparam
    - nolintlint
    # intrange enforces `for i := range n` over the C-style counted loop.
    # Enabled (rather than hand-fixing the two sites gopls flagged) because a
    # style fixed without enforcement regresses on the next contributor.
    - intrange
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - gosec # test fixtures use 0o644 files and variable paths by design
formatters:
  enable:
    - gofmt
    - gofumpt
